{% set page_title = 'Thêm khách hàng' %}
{% extends "base.html" %}
{% block title %}{{ page_title }}{% endblock %}

{% block content %}
<h4 class="page-title">{{ page_title }}</h4>

<div class="card">
    <div class="card-header">
        <div class="card-title">{{ page_title }}</div>
        <p class="card-category">Thông tin khách hàng dùng cho đơn hàng và phân cụm RFM</p>
    </div>
    <div class="card-body">
        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <div class="row">
                <div class="col-md-6 form-group">
                    <label>Tên khách hàng</label>
                    <input class="form-control" name="name" value="{{ form_data.get('name', customer.name if customer is defined else '') }}" required>
                </div>

                <div class="col-md-6 form-group">
                    <label>Số điện thoại</label>
                    <input class="form-control" name="phone" value="{{ form_data.get('phone', customer.phone if customer is defined else '') }}" required>
                </div>

                <div class="col-md-6 form-group">
                    <label>Email</label>
                    <input class="form-control" name="email" value="{{ form_data.get('email', customer.email if customer is defined else '') }}">
                </div>

                <div class="col-md-6 form-group">
                    <label>Phân khúc demo</label>
                    <input class="form-control" name="segment_demo" value="{{ form_data.get('segment_demo', customer.segment_demo if customer is defined else '') }}" placeholder="VIP / Regular / New">
                </div>

                <div class="col-md-12 form-group">
                    <label>Địa chỉ</label>
                    <textarea class="form-control" name="address" rows="3">{{ form_data.get('address', customer.address if customer is defined else '') }}</textarea>
                </div>
            </div>

            <button class="btn btn-primary" type="submit"><i class="la la-save"></i> Lưu</button>
            <a class="btn btn-secondary" href="{{ url_for('customers') }}">Hủy</a>
        </form>
    </div>
</div>
{% endblock %}
