<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><title>Thêm khách hàng</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:#f4f6f8;color:#111827}.container{width:92%;margin:24px auto}.nav{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}.nav a,.btn,a.btn{background:#16a34a;color:white;text-decoration:none;padding:9px 14px;border-radius:8px;font-weight:bold;border:none;cursor:pointer;font-size:14px}.nav .blue,.btn.blue{background:#2563eb}.nav .dark,.btn.dark{background:#111827}.nav .orange,.btn.orange{background:#f97316}.nav .gray,.btn.gray{background:#6b7280}.btn.red{background:#dc2626}h1{font-size:26px;color:#1f2937}.card{background:white;padding:16px;border-radius:12px;box-shadow:0 3px 12px rgba(0,0,0,.07);margin-bottom:16px}.search-form,.form-grid{display:grid;grid-template-columns:2fr 1fr auto;gap:10px;align-items:end}.form-grid{grid-template-columns:1fr 1fr}.full{grid-column:1/3}label{display:block;font-weight:bold;font-size:13px;margin-bottom:6px;color:#374151}input,select,textarea{width:100%;padding:10px;border:1px solid #d1d5db;border-radius:8px;font-size:14px}textarea{min-height:90px}.error{background:#fee2e2;color:#b91c1c;padding:11px;border-radius:8px;font-weight:bold;margin-bottom:12px}table{width:100%;border-collapse:collapse;background:white;font-size:13px}th{background:#16a34a;color:white;padding:10px;border:1px solid #e5e7eb}td{padding:9px;border:1px solid #e5e7eb;vertical-align:top}tr:nth-child(even){background:#f9fafb}.actions{display:flex;gap:6px;flex-wrap:wrap}.money{white-space:nowrap;text-align:right;font-weight:bold}.empty{text-align:center;color:#6b7280;font-weight:bold;padding:18px}.summary{font-weight:bold;margin-bottom:10px;color:#374151}@media(max-width:900px){.container{width:96%}.search-form,.form-grid{grid-template-columns:1fr}.full{grid-column:1/2}table{font-size:12px}}
</style>
</head><body><div class="container"><div class="nav"><a href="/">Trang chủ</a><a class="blue" href="/books">Sách</a><a class="dark" href="/customers">Khách hàng</a><a class="orange" href="/orders">Đơn hàng</a><a class="blue" href="/analytics">Phân tích</a></div><h1>Thêm khách hàng</h1><div class="card">{% if error %}<div class="error">{{ error }}</div>{% endif %}<form method="POST" action="{{ url_for('add_customer') }}">
<div class="form-grid"><div><label>Tên khách hàng</label><input name="name" value="{{ form_data.get('name', '') }}" required></div><div><label>Số điện thoại</label><input name="phone" value="{{ form_data.get('phone', '') }}" required></div><div><label>Email</label><input type="email" name="email" value="{{ form_data.get('email', '') }}"></div><div class="full"><label>Địa chỉ</label><textarea name="address">{{ form_data.get('address', '') }}</textarea></div></div><div class="actions" style="margin-top:14px"><button class="btn blue" type="submit">Lưu</button><a class="btn gray" href="/customers">Hủy</a></div>
</form></div></div></body></html>
