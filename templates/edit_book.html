{% set page_title = 'Sửa sách' %}
{% extends "base.html" %}
{% block title %}{{ page_title }}{% endblock %}

{% block content %}
<h4 class="page-title">{{ page_title }}</h4>

<div class="card">
    <div class="card-header">
        <div class="card-title">{{ page_title }}</div>
        <p class="card-category">Nhập thông tin sách để lưu vào MongoDB</p>
    </div>
    <div class="card-body">
        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <div class="row">
                <div class="col-md-6 form-group">
                    <label>Tên sách</label>
                    <input class="form-control" name="title" value="{{ form_data.get('title', book.title if book is defined else '') }}" required>
                </div>

                <div class="col-md-6 form-group">
                    <label>Tác giả</label>
                    <input class="form-control" name="author" value="{{ form_data.get('author', book.author if book is defined else '') }}" required>
                </div>

                <div class="col-md-4 form-group">
                    <label>Thể loại</label>
                    <input class="form-control" list="category-list" name="category" value="{{ form_data.get('category', book.category if book is defined else '') }}" required>
                    <datalist id="category-list">
                        {% for cat in categories %}
                        <option value="{{ cat }}">
                        {% endfor %}
                    </datalist>
                </div>

                <div class="col-md-4 form-group">
                    <label>Giá</label>
                    <input class="form-control" type="number" name="price" value="{{ form_data.get('price', book.price if book is defined else '') }}" required>
                </div>

                <div class="col-md-4 form-group">
                    <label>Tags</label>
                    <input class="form-control" name="tags" value="{{ form_data.get('tags', (book.tags|join(', ') if book is defined and book.tags is defined else '')) }}" placeholder="python, data, ai">
                </div>

                <div class="col-md-12 form-group">
                    <label>Mô tả</label>
                    <textarea class="form-control" name="description" rows="5">{{ form_data.get('description', book.description if book is defined else '') }}</textarea>
                </div>
            </div>

            <button class="btn btn-primary" type="submit"><i class="la la-save"></i> Lưu</button>
            <a class="btn btn-secondary" href="{{ url_for('books') }}">Hủy</a>
        </form>
    </div>
</div>
{% endblock %}
